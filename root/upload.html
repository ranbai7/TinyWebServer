<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f2f5 0%, #e6e9f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: #fff;
            padding: 40px 36px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            width: 400px;
            max-width: 90vw;
            text-align: center;
        }
        .card h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .card .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 36px 20px;
            margin-bottom: 20px;
            transition: border-color 0.3s, background 0.3s;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #4f6ef7;
            background: #f8faff;
        }
        .upload-area input[type="file"] {
            display: block;
            margin: 0 auto;
            font-size: 14px;
            color: #555;
        }
        .btn {
            width: 100%;
            padding: 13px 0;
            background: #4f6ef7;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .btn:hover {
            background: #3b54d4;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 110, 247, 0.4);
        }
        .btn-back {
            display: inline-block;
            margin-top: 16px;
            color: #999;
            font-size: 13px;
            text-decoration: none;
        }
        .btn-back:hover { color: #4f6ef7; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📁 文件上传</h2>
        <p class="subtitle">选择文件上传至服务器（10MB 以内）</p>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <div class="upload-area">
                <input type="file" name="file" required>
            </div>
            <button class="btn" type="submit">上 传</button>
        </form>
        <a href="javascript:history.back()" class="btn-back">← 返回上一页</a>
    </div>
</body>
</html>
