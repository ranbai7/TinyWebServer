<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebServer - 主面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f2f5 0%, #e6e9f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: #fff;
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            width: 340px;
            max-width: 90vw;
            text-align: center;
        }
        .card h2 {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .card .subtitle {
            color: #999;
            font-size: 13px;
            margin-bottom: 28px;
        }
        .menu-btn {
            display: block;
            width: 100%;
            padding: 14px 0;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .btn-pic { background: #eaf4ff; color: #4f6ef7; }
        .btn-pic:hover { background: #d4e6ff; }
        .btn-video { background: #eaf4ff; color: #4f6ef7; }
        .btn-video:hover { background: #d4e6ff; }
        .btn-fans { background: #fff5e6; color: #f39c12; }
        .btn-fans:hover { background: #ffeaca; }
        .btn-upload { background: #e6f7e6; color: #27ae60; }
        .btn-upload:hover { background: #c8f0c8; }
    </style>
</head>
<body>
    <div class="card">
        <h2>👋 欢迎回来</h2>
        <div class="subtitle">请选择操作</div>
        <form action="5" method="post">
            <button class="menu-btn btn-pic" type="submit">🖼 查看图片</button>
        </form>
        <form action="6" method="post">
            <button class="menu-btn btn-video" type="submit">🎬 查看视频</button>
        </form>
        <form action="7" method="post">
            <button class="menu-btn btn-fans" type="submit">⭐ 关注作者</button>
        </form>
        <form action="8" method="post">
            <button class="menu-btn btn-upload" type="submit">📁 文件上传</button>
        </form>
    </div>
</body>
</html>
